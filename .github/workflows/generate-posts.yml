name: Generate LinkedIn Post Drafts

on:
  schedule:
    # Cron is always UTC. 11:00 UTC = 08:00 BRT, every Monday.
    - cron: "0 11 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: "Day window to search for repos with activity"
        required: false
        default: "7"
      repo:
        description: "Analyze a specific repo (optional, e.g. distroless-java-poc)"
        required: false
        default: ""

# Prevents two concurrent runs from fighting each other
concurrency:
  group: generate-posts
  cancel-in-progress: false

permissions:
  contents: read   # checkout of the repo itself
  issues: write    # create the issue with the drafts

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Fine-grained read-only PAT (contents: read) on your POC repos.
          # Needed if there are private repos; for public repos the default
          # github.token works, but the PAT avoids the low rate limit.
          GH_POC_TOKEN: ${{ secrets.GH_POC_TOKEN || github.token }}
          GH_USER: ${{ github.repository_owner }}
          DAYS_WINDOW: ${{ inputs.days || '7' }}
          TARGET_REPO: ${{ inputs.repo || '' }}
        run: python src/main.py

      - name: Create review issue
        if: hashFiles('drafts/latest.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="📝 LinkedIn Drafts — $(date +'%Y-%m-%d')"
          gh issue create \
            --title "$TITLE" \
            --body-file drafts/latest.md \
            --label "linkedin-draft"

      - name: Upload drafts as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drafts-${{ github.run_number }}
          path: drafts/
          retention-days: 30
          if-no-files-found: ignore
